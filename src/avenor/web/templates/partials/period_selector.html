<div class="period-selector">
  <span class="period-label">Time Granularity:</span>
  <button data-period="day" class="period-pill {% if period == 'day' %}active{% endif %}">Daily</button>
  <button data-period="week" class="period-pill {% if period == 'week' %}active{% endif %}">Weekly</button>
  <button data-period="month" class="period-pill {% if period == 'month' %}active{% endif %}">Monthly</button>
</div>
