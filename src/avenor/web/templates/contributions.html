{% extends "base.html" %}
{% block content %}
<section class="hero card">
  <div>
    <p class="eyebrow">Contributions</p>
    <h1>{{ repository.owner }}/{{ repository.name }}</h1>
    <p class="lede">A week-at-a-glance view of the repo's contribution rhythm.</p>
  </div>
  <a class="button-link" href="/repos/{{ repository.slug }}">Back to overview</a>
</section>

<section class="card">
  <div class="timeline">
    {% for point in repository.trend %}
    <div class="timeline-row">
      <span>{{ point.label }}</span>
      <div class="timeline-track"><div class="timeline-fill" style="width: {{ point.value * 2.5 }}%"></div></div>
      <strong>{{ point.value }}</strong>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
