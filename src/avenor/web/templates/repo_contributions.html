{% extends "base.html" %}

{% block content %}
<section class="page-header">
  <div class="page-header-content">
    <div>
      <div class="page-header-badge">Contributions</div>
      <h1>Contribution Activity</h1>
      <p class="lede">Commits, issues, and pull requests over time for {{ selected_repository.full_name }}.</p>
    </div>
  </div>
</section>

<div class="charts-grid">
  <div class="chart-card chart-card--wide">
    {{ activity_chart|safe }}
  </div>
</div>

<div class="charts-grid charts-grid--2col">
  <div class="chart-card">
    {{ churn_chart|safe }}
  </div>
  <div class="chart-card">
    {{ domains_chart|safe }}
  </div>
</div>

<div class="charts-grid">
  <div class="chart-card chart-card--wide">
    {{ heatmap_chart|safe }}
  </div>
</div>
{% endblock %}
